server:
  port: 8081

spring:
  application:
    name: gateway

  datasource:
    url: jdbc:h2:mem:eventdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO

account:
  service:
    base-url: http://localhost:8082